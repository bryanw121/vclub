<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover: extend into notch/home-indicator areas on iOS Safari -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <!-- Prevent double-tap zoom on mobile web -->
    <meta name="touch-action" content="manipulation" />
    <!-- PWA / home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#F9F9F9" />
    <title>vclub</title>
    <style id="expo-reset">
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #F9F9F9;
      }
      body {
        /* Do NOT set overflow: hidden here — it prevents Safari from detecting
           scroll events, which stops the URL bar from ever collapsing. */
      }
      #root {
        /* position: fixed locks the app to the full viewport without relying on
           body overflow:hidden, so Safari still sees the page as potentially
           scrollable and will collapse the URL bar when the user scrolls. */
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        overflow: hidden;
      }
      /* Expo injects a wrapper div inside #root — it must also stretch full height */
      #root > div {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
