<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover: extend into notch/home-indicator areas on iOS Safari -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <!-- Prevent double-tap zoom on mobile web -->
    <meta name="touch-action" content="manipulation" />
    <!-- PWA / home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#F9F9F9" />
    <title>vclub</title>
    <style id="expo-reset">
      html, body {
        height: 100%;
        /* Use dvh so the app fills the full dynamic viewport (hides Safari toolbar) */
        height: 100dvh;
      }
      body {
        overflow: hidden;
        /* No padding here — app uses useSafeAreaInsets() to handle safe areas */
        background-color: #F9F9F9;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Expo injects a wrapper div inside #root — it must also stretch full height */
      #root > div {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
